<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Tip Jar</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; }
        .tip-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tip-btn { background: #6200ea; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .tip-btn:hover { background: #3700b3; }
        
        #payment-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        #mobile-link { display: inline-block; background: #03dac6; color: #000; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; width: 80%; }
        #qr-code { margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>

<div class="tip-container">
    <h2>Support My Work ☕</h2>
    <p>Select an amount to tip:</p>
    
    <div class="btn-group">
        <button class="tip-btn" onclick="generateTip('50.00')">₹50</button>
        <button class="tip-btn" onclick="generateTip('100.00')">₹100</button>
        <button class="tip-btn" onclick="generateTip('200.00')">₹200</button>
    </div>

    <div id="payment-section">
        <a id="mobile-link" href="#">Pay using UPI App</a>
        
        <p style="font-size: 14px; color: #666; margin: 15px 0 5px 0;">Or scan this QR code:</p>
        
        <img id="qr-code" src="" alt="UPI QR Code" width="200" height="200" />
    </div>
</div>

<script>
    function generateTip(amount) {
        // 1. Set your specific UPI details
        const upiId = "christophertauronoop-1@oksbi; // Replace with your actual UPI ID
        const payeeName = "Christopher Tauro"; // Replace with your App/Website name
        const transactionNote = "Thanks for the tip!";
        
        // 2. Construct the URI using encodeURIComponent to safely handle spaces
        const upiUri = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(payeeName)}&tn=${encodeURIComponent(transactionNote)}&am=${amount}&cu=INR`;

        // 3. Inject the URI into the mobile button's href attribute
        document.getElementById('mobile-link').href = upiUri;

        // 4. Generate the QR Code using a free, reliable API (qrserver)
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUri)}`;
        document.getElementById('qr-code').src = qrApiUrl;

        // 5. Reveal the payment section to the user
        document.getElementById('payment-section').style.display = "block";
    }
</script>

</body>
</html>
