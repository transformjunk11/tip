<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Tip Jar</title>
    <style>
        /* Base page styling */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #f0f2f5; margin: 0; padding: 20px; 
        }
        
        .tip-container { 
            background: white; padding: 35px 30px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; 
            max-width: 100%; width: 400px; box-sizing: border-box;
            opacity: 0; transform: translateY(30px);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin-top: 0; color: #1a1a1a; }
        p { color: #555; line-height: 1.5; }

        .emoji { 
            display: inline-block; 
            animation: bounce 2s infinite; 
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .btn-group { 
            display: flex; justify-content: center; gap: 12px; 
            flex-wrap: wrap; margin-top: 25px; 
        }
        
        /* Styled as buttons, but are actually <a> tags */
        .tip-btn { 
            background: linear-gradient(135deg, #6200ea, #9d4edd); 
            color: white; border: none; padding: 16px 20px; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; 
            flex: 1; min-width: 80px; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 15px rgba(98, 0, 234, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .tip-btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(98, 0, 234, 0.4);
        }
        
        .tip-btn:active {
            transform: translateY(2px) scale(0.96);
            box-shadow: 0 2px 10px rgba(98, 0, 234, 0.2);
        }

        .custom-amount { 
            margin-top: 25px; text-align: center; 
            font-size: 13px; color: #888; 
        }
    </style>
</head>
<body>

<div class="tip-container">
    <h2>Support My Work <span class="emoji">☕</span></h2>
    <p>Select an amount to tip directly via your UPI app:</p>
    
    <div class="btn-group">
         <a href="upi://pay?cu=INR&pa=christophertauronoop-1@oksbi&pn=Christopher%20Tauro&tn=Thanks%20for%20the%20tip!&am=10.00" class="tip-btn">₹10</a>
         <a href="upi://pay?cu=INR&pa=christophertauronoop-1@oksbi&pn=Christopher%20Tauro&tn=Thanks%20for%20the%20tip!&am=50.00" class="tip-btn">₹50</a>
        <a href="upi://pay?cu=INR&pa=christophertauronoop-1@oksbi&pn=Christopher%20Tauro&tn=Thanks%20for%20the%20tip!&am=100.00" class="tip-btn">₹100</a>
         <a href="upi://pay?cu=INR&pa=christophertauronoop-1@oksbi&pn=Christopher%20Tauro&tn=Thanks%20for%20the%20tip!&am=200.00" class="tip-btn">₹200</a>
    </div>
    
    <p class="custom-amount">Tapping a button will instantly open GPay, PhonePe, or Paytm.</p>
</div>

</body>
</html>
