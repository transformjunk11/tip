<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Tip Jar</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .tip-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 100%; width: 400px; box-sizing: border-box; }
        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .tip-btn { background: #6200ea; color: white; border: none; padding: 15px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.2s; flex: 1; min-width: 80px; }
        .tip-btn:hover { background: #3700b3; }
        .custom-amount { margin-top: 20px; text-align: center; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="tip-container">
    <h2>Support My Work ☕</h2>
    <p>Select an amount to tip directly via your UPI app:</p>
    
    <div class="btn-group">
        <button class="tip-btn" onclick="openUpiApp('50.00')">₹50</button>
        <button class="tip-btn" onclick="openUpiApp('100.00')">₹100</button>
        <button class="tip-btn" onclick="openUpiApp('200.00')">₹200</button>
    </div>
    
    <p class="custom-amount">Tapping a button will instantly open GPay, PhonePe, or Paytm.</p>
</div>

<script>
    function openUpiApp(amount) {
        // 1. Set your specific UPI details here
        const upiId = "christophertauronoop-1@oksbi; // Replace with your actual UPI ID
        const payeeName = "YChristopher Tauro"; // Replace with your App/Website name
        const transactionNote = "Thanks for the tip!";
        
        // 2. Construct the URI safely
        const upiUri = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(payeeName)}&tn=${encodeURIComponent(transactionNote)}&am=${amount}&cu=INR`;

        // 3. Force the mobile browser to instantly launch the intent
        window.location.href = upiUri;
    }
</script>

</body>
</html>
